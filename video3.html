<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dudu 💜</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:'Segoe UI', sans-serif;

    /* Deep sensual gradient */
    background: radial-gradient(circle at center, #3a001f, #120010, #000000);
}

/* Soft glowing particles */
.particle{
    position:absolute;
    width:6px;
    height:6px;
    border-radius:50%;
    background:rgba(255, 150, 200, 0.6);
    filter:blur(4px);
    animation: floatUp linear infinite;
}

@keyframes floatUp{
    from{
        transform:translateY(0);
        opacity:0.7;
    }
    to{
        transform:translateY(-110vh);
        opacity:0;
    }
}

.container{
    text-align:center;
    animation: fadeIn 2s ease;
}

/* Romantic text */
.title{
    color:#ff9ecf;
    font-size:24px;
    letter-spacing:2px;
    margin-bottom:25px;
    opacity:0.8;
}

/* Video styling */
video{
    width:85%;
    max-width:450px;
    border-radius:25px;
    cursor:pointer;
    box-shadow:0 0 60px rgba(255, 105, 180, 0.4);
    transition:0.5s;
    animation: breathingGlow 4s infinite alternate;
}

video:hover{
    transform:scale(1.05);
    box-shadow:0 0 90px rgba(255, 105, 180, 0.7);
}

/* Animations */
@keyframes fadeIn{
    from{ opacity:0; transform:scale(0.95); }
    to{ opacity:1; transform:scale(1); }
}

@keyframes breathingGlow{
    from{ box-shadow:0 0 40px rgba(255,105,180,0.3); }
    to{ box-shadow:0 0 80px rgba(255,105,180,0.6); }
}
</style>
</head>
<body>

<div class="container">
    <div class="title">Click for Dudu 💋</div>
    
    <video id="myVideo" autoplay loop playsinline>
        <source src="something.mp4" type="video/mp4">
    </video>
</div>

<script>
// Floating romantic particles
function createParticle(){
    const p = document.createElement("div");
    p.classList.add("particle");
    p.style.left = Math.random()*100 + "vw";
    p.style.bottom = "-10px";
    p.style.animationDuration = (5 + Math.random()*5) + "s";
    document.body.appendChild(p);

    setTimeout(()=>{ p.remove(); }, 10000);
}
setInterval(createParticle, 300);

// Click video -> go to Dudu page
document.getElementById("myVideo").onclick = function(){
    window.location.href = "video5.html";
};
</script>

</body>
</html>
